
services:
  certmate:
    build:
      context: .
      args:
        REQUIREMENTS_FILE: requirements.txt
    # Uncomment to use pre-built multi-platform image instead of building locally:
    # image: YOUR_DOCKERHUB_USERNAME/certmate:latest
    # platform: linux/amd64  # Optional: force specific platform (linux/amd64, linux/arm64)
    container_name: certmate
    ports:
      - "8000:8000"  # Exposed for reverse proxies (Coolify, nginx, Traefik). Bind to 127.0.0.1:8000:8000 to restrict to localhost.
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-}  # Auto-generated if empty; set a strong value for production
      - CLOUDFLARE_TOKEN=${CLOUDFLARE_TOKEN:-}
      - API_BEARER_TOKEN=${API_BEARER_TOKEN:-}
      - PORT=${PORT:-8000}                      # Internal listen port; also update ports: mapping if changed
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-300}  # Worker timeout; increase for slow DNS providers
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}    # Overrides the email set via the web UI when set
      # PowerDNS: set these to configure PowerDNS as the default DNS provider via env vars
      - POWERDNS_API_URL=${POWERDNS_API_URL:-}
      - POWERDNS_API_KEY=${POWERDNS_API_KEY:-}
    volumes:
      - ./certificates:/app/certificates:rw
      - ./logs:/app/logs:rw
      - ./data:/app/data:rw
      - ./backups:/app/backups:rw
    restart: unless-stopped
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: certmate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certificates:/etc/nginx/ssl:ro
    depends_on:
      certmate:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    profiles:
      - nginx

networks:
  default:
    name: certmate_network
